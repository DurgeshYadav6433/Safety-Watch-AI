<!doctype html>
<html>
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Register — Safety Watch AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">
<div class="max-w-md w-full p-6 bg-gray-800 rounded-lg shadow">
    <h1 class="text-2xl font-bold mb-4 text-center">Safety Watch Registration</h1>
    <input id="name" class="w-full p-3 mb-2 rounded bg-gray-700" placeholder="Full Name" />
    <input id="phone" class="w-full p-3 mb-2 rounded bg-gray-700" placeholder="Your Phone Number" />
    <input id="aadhar" class="w-full p-3 mb-2 rounded bg-gray-700" placeholder="Aadhar Number" />
    <div class="border-t border-gray-600 my-4 pt-2">
        <p class="text-xs text-gray-400 mb-2 font-bold uppercase">Emergency SMS Contacts</p>
        <input id="e1" class="w-full p-3 mb-2 rounded bg-gray-700 border-l-4 border-red-500" placeholder="Contact 1" />
        <input id="e2" class="w-full p-3 mb-2 rounded bg-gray-700 border-l-4 border-red-500" placeholder="Contact 2" />
    </div>
    <input id="email" type="email" class="w-full p-3 mb-2 rounded bg-gray-700" placeholder="Email" />
    <input id="password" type="password" class="w-full p-3 mb-2 rounded bg-gray-700" placeholder="Password (min 6)" />
    <button id="regBtn" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold mt-2">Create Account</button>
    <p id="msg" class="mt-3 text-sm text-center text-red-400"></p>
</div>
<script>
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

document.getElementById('regBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const userData = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        aadhar: document.getElementById('aadhar').value,
        contacts: [document.getElementById('e1').value, document.getElementById('e2').value],
        email: email
    };
    try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await db.collection('users').doc(cred.user.uid).set({ ...userData, createdAt: new Date().toISOString() });
        window.location.href = 'index.html';
    } catch (e) { document.getElementById('msg').innerText = e.message; }
};
</script>
</body>
</html>
